<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeetFit - 참석자 응답</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="participant-page" data-view="participant">
    <main class="participant-shell">
      <header class="participant-brandbar" aria-label="MeetFit">
        <a class="brand participant-brand" href="./participant.html" aria-label="MeetFit">
          <span class="brand-icon" aria-hidden="true">
            <img src="./assets/meetfit_logo.png" alt="" />
          </span>
          <span>MeetFit</span>

      </header>

      <div class="sr-only" aria-hidden="true">
        <span id="screenNumber">6</span>
        <h1 id="screenHeading">참석자 응답</h1>

      </div>

      <section class="participant-card">
        <article class="screen-panel participant-panel" id="screenPanel"></article>
      </section>
    </main>

    <footer class="site-footer">
      <div class="site-footer-inner">
        <p><strong>MeetFit</strong><span>회의 일정 조율 과제 프로토타입 · 지원자 정소희</span></p>

          <a href="https://meet-fit-six.vercel.app" target="_blank" rel="noreferrer">주최자 화면 <span aria-hidden="true">↗</span></a>
          <a href="https://github.com/heexohee/MeetFit" target="_blank" rel="noreferrer">GitHub 저장소 <span aria-hidden="true">↗</span></a>
        </nav>
      </div>

    <script src="./mock-data.js"></script>
    <script src="./script.js"></script>
